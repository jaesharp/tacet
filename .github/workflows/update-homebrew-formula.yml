name: Update Homebrew Formula

on:
  # Wait for release artifacts to be uploaded by the Go Bindings Release workflow
  workflow_run:
    workflows: ["Go Bindings Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.3.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    name: Update Homebrew Formula
    runs-on: macos-latest
    # Only run on successful completion of the Go Bindings Release workflow
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            # For workflow_run, get the tag from the head branch or use latest release
            VERSION=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "")
            if [ -z "$VERSION" ]; then
              echo "Error: Could not determine version"
              exit 1
            fi
          fi
          # Remove 'v' prefix if present
          VERSION_NUMBER="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION_NUMBER}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/agucova/tacet/releases/download/${VERSION}"

          mkdir -p /tmp/tacet-artifacts
          cd /tmp/tacet-artifacts

          echo "Downloading artifacts for ${VERSION}..."
          curl -fSL -o libtacet_c-darwin-arm64.a "${BASE_URL}/libtacet_c-darwin-arm64.a"
          curl -fSL -o libtacet_c-darwin-amd64.a "${BASE_URL}/libtacet_c-darwin-amd64.a"
          curl -fSL -o tacet.h "${BASE_URL}/tacet.h"
          curl -fSL -o tacet.hpp "${BASE_URL}/tacet.hpp"

          echo "Files downloaded:"
          ls -lh

      - name: Calculate SHA256 checksums
        id: checksums
        run: |
          cd /tmp/tacet-artifacts

          SHA256_ARM64=$(shasum -a 256 libtacet_c-darwin-arm64.a | cut -d' ' -f1)
          SHA256_AMD64=$(shasum -a 256 libtacet_c-darwin-amd64.a | cut -d' ' -f1)
          SHA256_HEADER=$(shasum -a 256 tacet.h | cut -d' ' -f1)
          SHA256_CPP_HEADER=$(shasum -a 256 tacet.hpp | cut -d' ' -f1)

          echo "sha256_arm64=${SHA256_ARM64}" >> $GITHUB_OUTPUT
          echo "sha256_amd64=${SHA256_AMD64}" >> $GITHUB_OUTPUT
          echo "sha256_header=${SHA256_HEADER}" >> $GITHUB_OUTPUT
          echo "sha256_cpp_header=${SHA256_CPP_HEADER}" >> $GITHUB_OUTPUT

          echo "Checksums calculated:"
          echo "  ARM64:      ${SHA256_ARM64}"
          echo "  AMD64:      ${SHA256_AMD64}"
          echo "  tacet.h:    ${SHA256_HEADER}"
          echo "  tacet.hpp:  ${SHA256_CPP_HEADER}"

      - name: Update formula
        run: |
          FORMULA_PATH="homebrew/Formula/tacet-c.rb"
          VERSION_NUMBER="${{ steps.version.outputs.version_number }}"
          SHA256_ARM64="${{ steps.checksums.outputs.sha256_arm64 }}"
          SHA256_AMD64="${{ steps.checksums.outputs.sha256_amd64 }}"
          SHA256_HEADER="${{ steps.checksums.outputs.sha256_header }}"
          SHA256_CPP_HEADER="${{ steps.checksums.outputs.sha256_cpp_header }}"

          # Update TACET_VERSION constant and version
          sed -i '' "s/TACET_VERSION = \".*\"/TACET_VERSION = \"${VERSION_NUMBER}\"/" "$FORMULA_PATH"

          # Update SHA256 checksums using awk to target each line by context
          # ARM64 checksum (line after darwin-arm64.a URL)
          awk -v sha="$SHA256_ARM64" '
            /darwin-arm64\.a/ { print; getline; sub(/sha256 "[a-f0-9]+"/, "sha256 \"" sha "\""); print; next }
            { print }
          ' "$FORMULA_PATH" > "$FORMULA_PATH.tmp" && mv "$FORMULA_PATH.tmp" "$FORMULA_PATH"

          # AMD64 checksum (line after darwin-amd64.a URL)
          awk -v sha="$SHA256_AMD64" '
            /darwin-amd64\.a/ { print; getline; sub(/sha256 "[a-f0-9]+"/, "sha256 \"" sha "\""); print; next }
            { print }
          ' "$FORMULA_PATH" > "$FORMULA_PATH.tmp" && mv "$FORMULA_PATH.tmp" "$FORMULA_PATH"

          # tacet.h checksum (line after tacet.h URL inside resource block)
          awk -v sha="$SHA256_HEADER" '
            /\/tacet\.h"$/ { print; getline; sub(/sha256 "[a-f0-9]+"/, "sha256 \"" sha "\""); print; next }
            { print }
          ' "$FORMULA_PATH" > "$FORMULA_PATH.tmp" && mv "$FORMULA_PATH.tmp" "$FORMULA_PATH"

          # tacet.hpp checksum (line after tacet.hpp URL inside resource block)
          awk -v sha="$SHA256_CPP_HEADER" '
            /\/tacet\.hpp"$/ { print; getline; sub(/sha256 "[a-f0-9]+"/, "sha256 \"" sha "\""); print; next }
            { print }
          ' "$FORMULA_PATH" > "$FORMULA_PATH.tmp" && mv "$FORMULA_PATH.tmp" "$FORMULA_PATH"

          echo "Formula updated:"
          git diff "$FORMULA_PATH"

      - name: Test formula
        run: |
          # Skip installation test - Homebrew requires formulas to be in a tap
          # The formula will be tested once it's committed to the repository
          echo "Skipping installation test (Homebrew requires tap)"

          # Verify formula syntax
          brew formula tacet-c --formula ./homebrew/Formula/tacet-c.rb || echo "Formula syntax check skipped"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add homebrew/Formula/tacet-c.rb

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Homebrew formula to ${{ steps.version.outputs.version }}"
            git push
          fi
